services:
  postgres:
    image: postgres:16-alpine
    container_name: langue-au-chat-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: langue
      POSTGRES_PASSWORD: langue
      POSTGRES_DB: langueauchat
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
